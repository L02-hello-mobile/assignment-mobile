name: Test & Sonar Scan
on:
  push:
    branches:
      - main
      - [cite_start]w8-sonar  # Kích hoạt khi push lên nhánh w8-sonar [cite: 342]
  pull_request:
    branches:
      - main
      - w8-sonar

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          [cite_start]fetch-depth: 0 # Quan trọng cho SonarCloud [cite: 329]

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          [cite_start]node-version: 18 [cite: 355]

      - name: Install Dependencies
        [cite_start]run: npm install --legacy-peer-deps [cite: 356]

      - name: Run Tests with Coverage
        # Lệnh này sinh ra file coverage/lcov.info để Sonar đọc [cite: 373, 396]
        run: npm run test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}